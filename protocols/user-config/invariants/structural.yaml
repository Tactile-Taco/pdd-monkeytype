invariants:
  - id: S-CFG-001
    statement: >
      Config objects conform to schemas/config.schema.json; unknown keys are rejected (additionalProperties false).
    severity: must
    rationale: >
      Protocol requirement. v1.1.0 (additive MINOR, brownfield batch 1):
      schema expanded from 10 to 24 keys; v1.1.1 patch relaxed fontSize to
      minimum:0 (BQ-IMPL-01); v1.2.0 (MINOR, batch 2) expands 24 to 37 keys
      (14 added, customThemeId removed pre-consumer per round-4 ruling
      BQ-CFG-01); statement unchanged. Consequence recorded for
      substitutability: a v1.0.0 candidate fail-closes on v1.1.0 keys, so
      candidates are re-admitted per minor event and the deployed line
      upgrades atomically per pdd:loop.
    validation:
      - schema-conformance
      - contract-tests
  - id: S-CFG-002
    statement: >
      Update requests must contain at least one known key and conform to schemas/config-update.schema.json.
    severity: must
    rationale: >
      Protocol requirement.
    validation:
      - schema-conformance
  - id: S-CFG-003
    statement: >
      All failures return the ErrorEnvelope schema.
    severity: must
    rationale: >
      Protocol requirement.
    validation:
      - contract-tests
