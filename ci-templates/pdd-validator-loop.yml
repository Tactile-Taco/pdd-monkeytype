name: pdd-validator-loop
on:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: pdd-main
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version: "22" }
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with: { python-version: "3.12" }
      - run: pip install pyyaml
      - run: npm install --no-audit --no-fund
      - name: Bundle lint
        run: for d in protocols/*/; do python3 harness/check_bundle.py "$d"; done
      - name: Compatibility
        run: python3 harness/check_compatibility.py protocols/
      - name: Structural layer
        run: npm run validate:structural
      - name: Behavioral layer
        run: npm run validate:behavioral
      - name: Operational layer
        run: npm run validate:operational
      - name: Evidence
        run: npm run evidence:build && npm run evidence:verify
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with: { name: pdd-evidence, path: evidence/ }
