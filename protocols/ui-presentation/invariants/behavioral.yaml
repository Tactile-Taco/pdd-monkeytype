invariants:
  - id: B-UI-001
    statement: >
      A single caret element exists in the test view whenever the test view is
      active. Logical caret position is DEFINED as (wordIndex, n) where n =
      length of the engine's current-word input (inputs[wordIndex]); the caret's
      bounding rect tracks it after every accepted keystroke, backspace retreat,
      and word commit: horizontally within 2px of (right edge of letter n-1 of the
      active word, or left edge of letter 0 when n == 0), vertically overlapping
      the active word's line box. The caret is visible: display != none,
      visibility != hidden, rect area >= 4px^2, opacity >= 0.5 in at least one of
      three samples 250ms apart (blink phase tolerance; blink itself delegated).
    severity: must
    rationale: >
      Orchestrator intent 1b. The engine exposes no caret object; the logical
      caret position definition resolves a critical ambiguity by definition
      (see ambiguity-log, CA-UI-01, confirmed round 2) and makes tracking
      machine-checkable in a real-browser layout engine. Caret blink and shape
      are delegated (adjudicated round 2, Q4); the 3-sample visibility check
      absorbs blink phase. The caret is net-new build (P4 acknowledged).
    property: "after each feed: |caret.x - boundary(activeWord, n)| <= 2px"
    validation:
      - caret-tracking
  - id: B-UI-002
    statement: >
      After every keystroke, the state class of every letter of every rendered
      word equals the engine per-character accounting for that position:
      typed char == target char -> correct; typed != target -> incorrect;
      typed char beyond target length -> extra; untyped -> no state class.
      Checked over scripted streams (chars, errors, extras, backspaces, word
      commits, backspace retreats) and fuzzed keystroke streams.
    severity: must
    rationale: >
      Orchestrator intent 1c, strengthened: classes must not merely exist, they
      must be faithful to engine state after every event, not only on commit.
    property: "for all letters: classOf(letter) == engineState(position)"
    validation:
      - dom-state-fidelity
  - id: B-UI-003
    statement: >
      Typed-history stability: within a session (between restart/complete
      boundaries), DOM mutations attributable to a keystroke are confined to the
      word element(s) active immediately before or after that keystroke, plus the
      caret and the live-stats region. Committed words are not re-rendered,
      reflowed, or re-classed by later keystrokes. Full re-render is permitted
      only on restart/new-test.
    severity: must
    rationale: >
      Orchestrator intent 1f. Mutation-confinement formulation is checkable with
      a MutationObserver and pins the intent (stable history) without forbidding
      the commit-transition class changes on the word being left.
    property: "mutated .word set <= {active_before, active_after} per keystroke"
    validation:
      - dom-mutation-confinement
  - id: B-UI-004
    statement: >
      On completed_event, the test view is hidden and the results view shown, and
      the results view's text presents the wpm and acc values of the CompletedEvent
      payload exactly (numeric equality with the payload values as rendered by
      canonical number-to-string; decoration such as a '%' suffix or labels is
      delegated). Rounded/integer display of these two values does not conform.
    severity: must
    rationale: >
      Orchestrator intent 1e. Exact-value rule resolves the formatting ambiguity
      up front (cosmetic latitude would let 'matches' drift to 'approximately').
    validation:
      - results-fidelity
  - id: B-UI-005
    statement: >
      The active theme is applied by setting the sealed tokens on :root, with
      resolution precedence: (1) user-config custom theme slots, when ALL nine
      slot keys are non-empty AND every value conforms to the charter color
      pattern — the slots form the active token set; (2) otherwise the catalog
      theme named by user-config theme (read from the theme-catalog
      handshake); (3) otherwise (unknown, absent, or unreadable value) the
      default dark theme, which satisfies the charter bands. Applying a theme
      changes token values only, never structure.
    severity: must
    rationale: >
      v2.0.0: promoted should -> must via the upgrade path pre-noted in the
      v1.0.0 rationale (multi-theme became persistent: theme-catalog bundle
      provides the named catalog; user-config v1.2.0 carries custom slots).
      Precedence sealed per orchestrator instruction (custom slots incl.
      --sub-alt per C2); the all-nine-slots gate keeps partial/malformed
      custom themes fail-closed onto the catalog/default path [verify
      reference editor behavior at implementation].
    property: "resolvedTokens == customSlots if allValid(slots) else catalog(theme) else default"
    validation:
      - computed-style-metrics
      - contract-tests
  - id: B-UI-006
    statement: >
      During an active session the active word remains within the visible
      scrollport of the word-stream container (its bounding rect intersects the
      container's visible region) after every keystroke.
    severity: should
    rationale: >
      Author addition: long sessions (time mode, 200-word caps) scroll; an
      off-screen active word silently breaks every visual invariant above.
      Should-level because 'visible region' tolerances are layout-sensitive.
    validation:
      - dom-structure
  - id: B-UI-007
    statement: >
      Blind-mode display: when blindMode=true, letters in the incorrect and
      extra states render with computed colors identical to the correct state
      (all RGB channels equal), while untyped is unaffected; the letter-state
      CLASSES of S-UI-002 still carry the true engine state (hiding is
      presentational only, accounting is engine-side per B-ENG-008(e)). The
      color distinction floor of O-UI-003 is suspended for those states.
    severity: must
    rationale: >
      v2.0.0 addition (annex: blind mode hides errors — incorrect letters
      render visually identical to correct — while errors are still counted).
      Sealing the identity (incorrect/extra == correct in computed color)
      keeps blind mode machine-checkable without touching the engine or the
      DOM class contract. [verify whether extra also hides, at implementation]
    property: "blindMode=true => color(incorrect) == color(correct) && color(extra) == color(correct)"
    validation:
      - computed-style-metrics
  - id: B-UI-008
    statement: >
      Tape mode: when tapeMode=true, the word stream lays out on a single
      horizontal line and scrolls horizontally with an anchored caret — the
      caret's horizontal position within the stream viewport stays fixed
      (±2px across keystrokes) while the stream translates so the active
      position remains at the anchor. Reading order (S-UI-001), caret
      tracking (B-UI-001), and mutation confinement to the active word +
      stream translation (B-UI-003) still hold.
    severity: must
    rationale: >
      v2.0.0 addition (annex: tape = horizontal scroll, anchored caret).
      The fixed-anchor formulation is the machine-checkable essence; scroll
      easing/animation is delegated. [verify anchor position (left offset vs
      center) at implementation — the invariant pins FIXITY, not location]
    property: "tapeMode=true => |caret.viewportX(keystroke_n+1) - caret.viewportX(keystroke_n)| <= 2px"
    validation:
      - caret-tracking
  - id: B-UI-009
    statement: >
      Quick-restart: when user-config quickRestart != off, pressing the
      configured key dispatches an engine restart keystroke-event (per the
      keystroke handshake) and produces no character input; when off, no such
      key binding exists. Other handling of the key is delegated.
    severity: must
    rationale: >
      v2.0.0 addition (annex: Tab restarts; enum + default carried in
      user-config v1.1.0). Sealed at the dispatched-effect level so key
      ROUTING details (focus rules, preventDefault) stay client-side.
      [verify against reference routing at implementation]
    property: "quickRestart=k != off => keypress(k) => restart event && no char event"
    validation:
      - keystroke-contract
  - id: B-UI-010
    statement: >
      Color modes (composite): (a) flipTestColors=true — the word stream
      renders with the text-role and bg-role tokens swapped: letter colors
      derive from --bg, the stream-area background from --text; contrast
      floors O-UI-001 still hold (WCAG symmetry) and the dark-family band
      O-UI-002(i) is gated off per its statement; (b) colorfulError=true —
      incorrect and extra states render in high-saturation variants of the
      error hues (source: the --colorful-error token, ratified as the ninth
      sealed slot round 4; for token sets predating ratification, a
      saturation-raised derivation of --error); the error
      hue band O-UI-002(ii) still applies. Neither mode changes structure,
      classes, or accounting.
    severity: must
    rationale: >
      v2.0.0 addition (feature-inventory; composite shape per marginal-must
      discipline). Token-role swap is the checkable essence of "flip test
      colors"; saturation-variant is the checkable essence of "colorful
      error". [verify reference derivation rules at implementation]
    property: "flip => colorRole(text)<->colorRole(bg); colorfulError => s(errorStates) > s(--error) within hue band"
    validation:
      - computed-style-metrics
  - id: B-UI-011
    statement: >
      Random theme: when randomTheme=true, a catalog theme is selected at each
      test start and applied atomically (sealed tokens set on :root before the
      first keystroke of the session); the selection algorithm is delegated.
    severity: should
    rationale: >
      v2.0.0 addition (feature-inventory). Should-level: the selection is
      intentionally non-deterministic, so only atomicity and charter
      conformance of the applied result are worth governing — the rest would
      buy validator cost, not contract value.
    validation:
      - computed-style-metrics
