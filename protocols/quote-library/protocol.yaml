protocol:
  name: quote-library
  version: 1.0.0
  status: sealed
purpose: >
  Typing-test quote corpus: random approved-quote fetch by language and length
  group, user submission into a pending state, moderator approval, and 1-5 star
  rating with exposed averages.
boundary:
  in_scope:
    - Random quote read (approved only), submission, approval, rating
    - Length grouping into four configured ranges (groups 0..3)
  out_of_scope:
    - Quote reporting/moderation queues beyond approve, multi-language search
depends_on: [user-account]
provides:
  quote: schemas/quote.schema.json
consumes:
  auth-token: user-account
handshakes:
  quote: schemas/quote.schema.json
  submit_request: schemas/submit-request.schema.json
  rate_request: schemas/rate-request.schema.json
  error: schemas/error.schema.json
invariants:
  structural: invariants/structural.yaml
  behavioral: invariants/behavioral.yaml
  operational: invariants/operational.yaml
capabilities: capability-manifest.yaml
validators: validators/validation-plan.yaml
evidence: evidence-requirements.yaml
