capabilities:
  network:
    outbound_allowlist: []
    deny_other_outbound: true
  filesystem:
    read: []
    write: [data/results.json]
  database:
    max_writes_per_request: 2
  dependencies:
    allow: [express, node:crypto]
  resources:
    max_latency_ms_p95: 100
    max_memory_mb: 128
  secrets:
    allow: []
  background_work:
    allowed: false
