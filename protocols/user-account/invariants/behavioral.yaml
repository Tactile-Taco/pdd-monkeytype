invariants:
  - id: B-ACC-001
    statement: >
      Usernames are unique under case-insensitive comparison: a second signup differing only by case returns conflict and creates no account.
    severity: must
    rationale: >
      Protocol requirement.
    property: "signup(n,p); signup(toUpper(n),p') => conflict"
    validation:
      - property-check
  - id: B-ACC-002
    statement: >
      A token issued at login verifies to the same uid until expiry or revocation; revoked/unknown/expired tokens verify as unauthorized.
    severity: must
    rationale: >
      Protocol requirement.
    validation:
      - property-check
      - contract-tests
  - id: B-ACC-003
    statement: >
      Login with a wrong password returns unauthorized and does not issue a token; error shape is identical to unknown-user to prevent enumeration.
    severity: must
    rationale: >
      Protocol requirement.
    validation:
      - contract-tests
