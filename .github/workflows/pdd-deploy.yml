name: pdd-deploy
on:
  workflow_dispatch:
    inputs:
      script:
        description: "Worker script name to deploy"
        required: true
        default: pdd-monkeytype-ui
permissions:
  contents: read
env:
  CLOUDFLARE_ACCOUNT_ID: 96e74222e25d1a53d024effeb20ac32a
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - run: node worker/build.mjs
      - name: deploy via Cloudflare API (docs/09 pattern)
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bash worker/deploy-ci.sh "${{ inputs.script }}"
