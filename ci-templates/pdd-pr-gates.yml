name: pdd-pr-gates
on:
  pull_request:
permissions:
  contents: read
jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with: { python-version: "3.12" }
      - run: pip install pyyaml
      - name: Bundle lint
        run: for d in protocols/*/; do python3 harness/check_bundle.py "$d"; done
      - name: Compatibility
        run: python3 harness/check_compatibility.py protocols/
