capabilities:
  network:
    outbound_allowlist: []
    deny_other_outbound: true
  filesystem:
    read: []
    write: [data/apekeys.json]
  database:
    max_writes_per_request: 1
  dependencies:
    allow: [express]
  resources:
    max_latency_ms_p95: 150
    max_memory_mb: 128
  secrets:
    allow: []
  background_work:
    allowed: false
