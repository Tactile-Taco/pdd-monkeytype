invariants:
  - id: S-ENG-001
    statement: >
      Completion events conform to schemas/completed-event.schema.json, including charStats as the fixed-position tuple [correct, incorrect, extra, missed] and chartData arrays capped at 122 samples.
    severity: must
    rationale: >
      Protocol requirement.
    validation:
      - schema-conformance
      - property-check
  - id: S-ENG-002
    statement: >
      The engine accepts a keystroke event stream per schemas/keystroke-event.schema.json; out-of-contract events are ignored without corrupting session state.
    severity: must
    rationale: >
      Protocol requirement.
    validation:
      - contract-tests
  - id: S-ENG-003
    statement: >
      Mode is one of time|words|quote|zen|custom; mode2 carries the mode parameter (seconds, word count, quote id, or custom target) as a string. For custom mode the target is a positive integer (seconds or word count per the session's configured custom unit).
    severity: must
    rationale: >
      Protocol requirement. v2.0.0: "custom marker" clarified to custom target
      (custom mode = user-defined time-seconds or word-count target, otherwise
      identical to time/words completion). Clarification, not a behavior change.
    validation:
      - schema-conformance
  - id: S-ENG-004
    statement: >
      Word lists injected at session start conform to schemas/wordlist.schema.json; a non-conforming list is rejected before the first keystroke and never starts a session.
    severity: must
    rationale: >
      v2.0.0 addition. Formalizes the pre-existing injection point (O-ENG-003:
      pure computation over injected word lists) as the abstract wordlist
      handshake. Internal lists remain the default provider; the wordlists
      bundle (roadmap D3) plugs in as a provider with no engine re-versioning.
    validation:
      - schema-conformance
      - contract-tests
