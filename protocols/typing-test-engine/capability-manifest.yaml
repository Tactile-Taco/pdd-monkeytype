capabilities:
  network:
    outbound_allowlist: []
    deny_other_outbound: true
    during_active_test: none
  filesystem:
    read: []
    write: []
  dependencies:
    allow: []
  resources:
    max_keystroke_handling_ms: 5
    max_memory_mb: 64
    max_concurrent_sessions_per_client: 1
  secrets:
    allow: []
  background_work:
    allowed: false
