capabilities:
  network:
    outbound_allowlist: []
    deny_other_outbound: true
  filesystem:
    read: [data/results.json]
    write: []
  database:
    max_writes_per_request: 0
  dependencies:
    allow: [express]
  resources:
    max_latency_ms_p95: 100
    max_memory_mb: 128
  secrets:
    allow: []
  background_work:
    allowed: false
