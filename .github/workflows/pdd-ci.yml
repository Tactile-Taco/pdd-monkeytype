name: pdd-validator-loop
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: install headless chrome
        run: |
          npx --yes @puppeteer/browsers install chrome-headless-shell@stable --path /tmp/chrome
          echo "CHROME_PATH=$(find /tmp/chrome -name chrome-headless-shell -type f | head -1)" >> $GITHUB_ENV
      - name: install pngdiff deps (O-UI-005 Pillow/numpy)
        run: python3 -m pip install --quiet pillow numpy || python3 -m pip install --quiet --break-system-packages pillow numpy
      - name: recapture host-pinned baseline (O-UI-005, per sealed evidence-requirements)
        run: |
          # ui-presentation v2.0.0: baseline = admitted v3.0 candidate (replica path
          # retired). Capture mode returns O-UI-005:pass unconditionally, so the
          # gate below is what actually proves the baseline landed.
          node protocols/ui-presentation/validators/run.mjs --boot-candidate --baseline-mode capture --capture-note ci || true
      - name: Gate — baseline recaptured on THIS runner (o-ui-005-ci-diagnosis)
        run: |
          python3 - <<'PYEOF'
          import json, datetime
          m = json.load(open('protocols/ui-presentation/evidence/baseline/manifest.json'))
          t = datetime.datetime.fromisoformat(m['captured_at'].replace('Z', '+00:00'))
          age = (datetime.datetime.now(datetime.timezone.utc) - t).total_seconds()
          assert age < 900, f'stale baseline ({age:.0f}s) - capture step did not land'
          assert 'HeadlessChrome/15' in m.get('chromium_version', ''), m.get('chromium_version')
          print('baseline fresh:', m['captured_at'], m.get('host_image_id','')[:27])
          PYEOF
      - name: validator loop (3-layer + ui-presentation)
        run: |
          npm run validate:structural
          npm run validate:behavioral
          npm run validate:operational
          RUNS=50
          if [ "${{ github.event_name }}" = "schedule" ]; then RUNS=200; fi
          npm run validate:ui -- --boot-candidate --runs "$RUNS"
          npm run evidence:build
          npm run evidence:verify
      - name: dump ui evidence on failure
        if: failure()
        run: |
          echo "=== harness/out/ui-presentation.json (O-UI-005 region) ==="
          python3 - <<'PYEOF'
          import json
          d = json.load(open('harness/out/ui-presentation.json'))
          print(json.dumps(d, indent=1)[:500])
          for c in d.get('validation_results', []):
              if c.get('invariant_id') == 'O-UI-005':
                  print(json.dumps(c, indent=1))
          PYEOF
      - name: upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdd-evidence-${{ github.run_id }}
          path: |
            harness/out/
            evidence/
          if-no-files-found: ignore
